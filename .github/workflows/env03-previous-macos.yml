name: ENV-03 previous macOS smoke

on:
  workflow_dispatch:
    inputs:
      dmg_url:
        description: "HTTPS URL for the arm64 DMG built from the commit under test"
        required: false
        default: ""
        type: string
      app_zip_url:
        description: "HTTPS URL for a zipped Elevate.app built from the commit under test; dev fallback when no DMG is available"
        required: false
        default: ""
        type: string
      allow_unnotarized:
        description: "Allow a signed but unnotarized dev app artifact; keeps ENV-03 partial until a notarized DMG passes"
        required: false
        default: false
        type: boolean
      skip_parity:
        description: "Skip repo web_dist parity for externally built app artifacts; keeps ENV-03 partial"
        required: false
        default: false
        type: boolean
      skip_sidecar:
        description: "Skip JSON-RPC sidecar prompt smoke when no model/API key is configured; keeps ENV-03 partial"
        required: false
        default: false
        type: boolean
      expected_app_version:
        description: "Expected app version; blank uses desktop/package.json"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Apple Silicon previous macOS
    runs-on: macos-15
    timeout-minutes: 25
    env:
      ELEVATE_DESKTOP_PORT: "9143"
      ELEVATE_LICENSE_JSON_B64: ${{ secrets.ELEVATE_LICENSE_JSON_B64 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify previous macOS Apple Silicon runner
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          case "$(sw_vers -productVersion)" in
            15.*) ;;
            *) echo "ENV-03 requires macOS 15.x for the previous-macOS lane" >&2; exit 1 ;;
          esac

      - name: Install smoke dependency
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/smoke-venv"
          "$RUNNER_TEMP/smoke-venv/bin/python" -m pip install websockets

      - name: Set up Node for dashboard parity
        if: ${{ inputs.skip_parity == false }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/web/package-lock.json

      - name: Build dashboard assets for parity
        if: ${{ inputs.skip_parity == false }}
        run: |
          set -euo pipefail
          npm --prefix cli/web ci
          npm --prefix cli/web run build

      - name: Download and copy app
        run: |
          set -euo pipefail
          dmg="$RUNNER_TEMP/Elevate-env03-arm64.dmg"
          zip="$RUNNER_TEMP/Elevate-env03-arm64.zip"
          mount_dir="$RUNNER_TEMP/elevate-dmg"
          app_path="$RUNNER_TEMP/Elevate.app"
          mkdir -p "$mount_dir"
          if [ -n "${{ inputs.dmg_url }}" ]; then
            curl --fail --location --show-error --output "$dmg" "${{ inputs.dmg_url }}"
            hdiutil attach -readonly -nobrowse -mountpoint "$mount_dir" "$dmg"
            trap 'hdiutil detach "$mount_dir" || true' EXIT
            cp -R "$mount_dir/Elevate.app" "$app_path"
            hdiutil detach "$mount_dir"
            trap - EXIT
          elif [ -n "${{ inputs.app_zip_url }}" ]; then
            curl --fail --location --show-error --output "$zip" "${{ inputs.app_zip_url }}"
            ditto -x -k "$zip" "$RUNNER_TEMP"
            test -d "$app_path"
          else
            echo "Provide either dmg_url or app_zip_url" >&2
            exit 1
          fi
          file "$app_path/Contents/MacOS/Elevate" | tee "$RUNNER_TEMP/elevate-binary-file.txt"
          grep -q "arm64" "$RUNNER_TEMP/elevate-binary-file.txt"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          if [ "${{ inputs.allow_unnotarized }}" = "true" ]; then
            echo "Skipping spctl for signed but unnotarized dev artifact"
          else
            spctl --assess --type execute --verbose=4 "$app_path"
          fi

      - name: Seed licensed disposable home
        run: |
          set -euo pipefail
          test -n "$ELEVATE_LICENSE_JSON_B64"
          home="$RUNNER_TEMP/elevate-home"
          mkdir -p "$home/.elevate"
          LICENSE_PATH="$home/.elevate/license.json" \
            python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["LICENSE_PATH"]).write_bytes(base64.b64decode(os.environ["ELEVATE_LICENSE_JSON_B64"]))'
          chmod 600 "$home/.elevate/license.json"

      - name: Launch app and run installed smoke
        run: |
          set -euo pipefail
          app_path="$RUNNER_TEMP/Elevate.app"
          home="$RUNNER_TEMP/elevate-home"
          smoke_python="$RUNNER_TEMP/smoke-venv/bin/python"
          expected="${{ inputs.expected_app_version }}"
          if [ -z "$expected" ]; then
            expected="$("$smoke_python" -c 'import json; print(json.load(open("desktop/package.json"))["version"])')"
          fi

          HOME="$home" \
          ELEVATE_HOME="$home/.elevate" \
          ELEVATE_DESKTOP_PORT="$ELEVATE_DESKTOP_PORT" \
          "$app_path/Contents/MacOS/Elevate" > "$RUNNER_TEMP/elevate-stdout.log" 2>&1 &
          app_pid="$!"
          trap 'kill "$app_pid" 2>/dev/null || true' EXIT

          ready=0
          actual_port="$ELEVATE_DESKTOP_PORT"
          for _ in $(seq 1 90); do
            for port in $(seq "$ELEVATE_DESKTOP_PORT" "$((ELEVATE_DESKTOP_PORT + 10))"); do
              if curl --fail --silent "http://127.0.0.1:$port/chat?new=env03" >/dev/null; then
                actual_port="$port"
                ready=1
                break 2
              fi
            done
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "Elevate did not open dashboard port range $ELEVATE_DESKTOP_PORT-$((ELEVATE_DESKTOP_PORT + 10))" >&2
            tail -200 "$RUNNER_TEMP/elevate-stdout.log" || true
            tail -200 "$home/Library/Logs/Elevate/main.log" || true
            exit 1
          fi

          smoke_args=(
            --installed-app "$app_path" \
            --repo-root "$PWD" \
            --port "$actual_port" \
            --expected-app-version "$expected" \
            --main-log "$home/Library/Logs/Elevate/main.log" \
            --timeout 180 \
            --json-out "$RUNNER_TEMP/elevate-env03-previous-macos-smoke.json"
          )
          if [ "${{ inputs.skip_parity }}" = "true" ]; then
            smoke_args+=(--skip-parity)
          fi
          if [ "${{ inputs.skip_sidecar }}" = "true" ]; then
            smoke_args+=(--skip-sidecar)
          fi

          ELEVATE_HOME="$home/.elevate" \
          "$smoke_python" cli/scripts/installed_runtime_smoke.py "${smoke_args[@]}"

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env03-previous-macos-smoke
          path: |
            ${{ runner.temp }}/elevate-env03-previous-macos-smoke.json
            ${{ runner.temp }}/elevate-binary-file.txt
            ${{ runner.temp }}/elevate-stdout.log
            ${{ runner.temp }}/elevate-home/Library/Logs/Elevate/main.log
          if-no-files-found: ignore
