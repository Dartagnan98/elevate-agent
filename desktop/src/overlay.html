<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
  }
  /* A glowing inset border that pulses while the agent is driving the Mac.
     Click-through is handled by the Electron window (setIgnoreMouseEvents). */
  #glow {
    position: fixed;
    inset: 0;
    border-radius: 10px;
    box-shadow:
      inset 0 0 14px 2px rgba(176, 176, 176, 0.45),
      inset 0 0 46px 12px rgba(176, 176, 176, 0.28),
      inset 0 0 110px 30px rgba(176, 176, 176, 0.16);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1; }
  }
  /* The Elevate computer-use badge — a pill that rides the top edge while
     the agent controls the Mac. */
  #badge {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 9px;
    font: 600 12px -apple-system, "SF Pro Text", system-ui, sans-serif;
    color: #fff;
    background: rgba(176, 176, 176, 0.96);
    padding: 6px 16px 7px;
    border-radius: 0 0 11px 11px;
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.35);
  }
  /* Live indicator dot — breathes on its own so the badge reads as active
     even at a glance. */
  #dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 7px 2px rgba(255, 255, 255, 0.85);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.7); }
  }
  #badge .brand {
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  #badge .sep {
    opacity: 0.55;
    font-weight: 400;
  }
  #badge .label {
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div id="glow"></div>
  <div id="badge">
    <span id="dot"></span>
    <span class="brand">Elevate</span>
    <span class="sep">/</span>
    <span class="label">Computer Use</span>
  </div>
</body>
</html>
