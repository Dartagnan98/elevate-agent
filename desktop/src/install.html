<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate Setup</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
        color: #e8eef8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 30%, rgba(96, 165, 250, 0.14), transparent 32%),
          linear-gradient(145deg, #08111f, #101827);
      }
      main {
        width: min(560px, calc(100vw - 48px));
        padding: 34px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 24px;
        background: rgba(8, 17, 31, 0.78);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.28);
      }
      .mark {
        width: 54px;
        height: 54px;
        margin-bottom: 22px;
        border: 1px solid rgba(120, 245, 191, 0.45);
        border-radius: 17px;
        display: grid;
        place-items: center;
        color: #78f5bf;
        font-size: 27px;
        font-weight: 700;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        font-weight: 720;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 22px;
        color: #9aa8bb;
        font-size: 15px;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      button {
        height: 42px;
        border: 0;
        border-radius: 11px;
        padding: 0 16px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      .primary {
        background: #78f5bf;
        color: #062013;
      }
      .secondary {
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.8);
        color: #e8eef8;
      }
      #status {
        min-height: 22px;
        margin-top: 18px;
        color: #9aa8bb;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">E</div>
      <h1>Elevate runtime not found</h1>
      <p>
        The desktop shell is installed, but the local Elevate runtime is not reachable yet.
        Install it once, then this app will start the dashboard automatically.
      </p>
      <div class="actions">
        <button class="primary" id="install">Install Elevate</button>
        <button class="secondary" id="retry">Retry</button>
      </div>
      <div id="status"></div>
    </main>
    <script>
      const statusEl = document.getElementById("status");
      document.getElementById("retry").addEventListener("click", async () => {
        statusEl.textContent = "Checking Elevate...";
        const result = await window.elevateDesktop.retry();
        if (!result.ok) statusEl.textContent = "Elevate is still not reachable.";
      });
      document.getElementById("install").addEventListener("click", async () => {
        statusEl.textContent = "Starting installer...";
        const result = await window.elevateDesktop.install();
        statusEl.textContent = result.message || "Installer started.";
      });
    </script>
  </body>
</html>
