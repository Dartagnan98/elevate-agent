<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate Setup</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", system-ui, sans-serif;
        --bg: #0F0F0F;
        --surface: #1A1A1A;
        --border: #2A2A2A;
        --border-strong: #353535;
        --text: #ececec;
        --muted: #A0A0A0;
        --accent: #8A8A8A;
        --accent-hover: #B0B0B0;
        --mono: ui-monospace, "JetBrains Mono", SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
      }
      main {
        width: min(520px, calc(100vw - 48px));
        padding: 36px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }
      .mark {
        width: 44px;
        height: 44px;
        margin-bottom: 24px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--accent);
        font-family: var(--mono);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--text);
      }
      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        height: 38px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 16px;
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      }
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .primary {
        background: var(--accent);
        color: #0F0F0F;
      }
      .primary:hover {
        background: var(--accent-hover);
      }
      .secondary {
        border-color: var(--border-strong);
        background: transparent;
        color: var(--text);
      }
      .secondary:hover {
        background: var(--bg);
        border-color: var(--muted);
      }
      #status {
        min-height: 18px;
        margin-top: 20px;
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">E</div>
      <div class="eyebrow">SETUP REQUIRED</div>
      <h1>Elevate runtime not found</h1>
      <p>
        The desktop shell is installed, but the local Elevate runtime is not reachable.
        Install it once and this app will start the dashboard automatically next launch.
      </p>
      <div class="actions">
        <button class="primary" id="install">Install Elevate</button>
        <button class="secondary" id="retry">Retry</button>
      </div>
      <div id="status"></div>
    </main>
    <script>
      const statusEl = document.getElementById("status");
      document.getElementById("retry").addEventListener("click", async () => {
        statusEl.textContent = "CHECKING RUNTIME";
        const result = await window.elevateDesktop.retry();
        if (!result.ok) statusEl.textContent = "RUNTIME NOT REACHABLE";
      });
      document.getElementById("install").addEventListener("click", async () => {
        statusEl.textContent = "STARTING INSTALLER";
        const result = await window.elevateDesktop.install();
        statusEl.textContent = (result.message || "INSTALLER STARTED").toUpperCase();
      });
    </script>
  </body>
</html>
