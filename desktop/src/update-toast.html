<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Elevate update</title>
    <style>
      /* Window itself is frameless + transparent; this body draws the card. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          Helvetica, Arial, sans-serif;
        color: #ececec;
        overflow: hidden;
      }

      .card {
        position: absolute;
        inset: 12px;
        background: rgba(15, 15, 15, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.45),
          0 2px 6px rgba(0, 0, 0, 0.35);
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }
      .card.show {
        opacity: 1;
        transform: translateY(0);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8A8A8A;
        flex: 0 0 auto;
        box-shadow: 0 0 0 3px rgba(176, 176, 176, 0.16);
      }
      .dot.ready {
        background: #4FC38A;
        box-shadow: 0 0 0 3px rgba(79, 195, 138, 0.18);
      }
      .dot.error {
        background: #E0B257;
        box-shadow: 0 0 0 3px rgba(224, 178, 87, 0.18);
      }

      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        flex: 1 1 auto;
      }

      .sub {
        font-size: 11px;
        color: rgba(236, 236, 236, 0.6);
        line-height: 1.35;
      }

      .bar {
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .bar > .fill {
        height: 100%;
        width: 0%;
        background: #8A8A8A;
        transition: width 200ms ease;
      }

      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        color: #ececec;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      button.primary {
        background: #8A8A8A;
        border-color: #8A8A8A;
        color: #0F0F0F;
      }
      button.primary:hover {
        background: #B0B0B0;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="row">
        <div class="dot" id="dot"></div>
        <div class="title" id="title">Update available</div>
      </div>
      <div class="sub" id="sub">Downloading in the background.</div>
      <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
      <div class="actions">
        <button id="dismiss">Later</button>
        <button id="install" class="primary" style="display: none">
          Restart to update
        </button>
      </div>
    </div>

    <script>
      const api = window.elevateDesktop && window.elevateDesktop.updater;
      const card = document.getElementById("card");
      const dot = document.getElementById("dot");
      const titleEl = document.getElementById("title");
      const subEl = document.getElementById("sub");
      const bar = document.getElementById("bar");
      const fill = document.getElementById("fill");
      const installBtn = document.getElementById("install");
      const dismissBtn = document.getElementById("dismiss");

      // Tiny grace period so the slide-in animation plays.
      requestAnimationFrame(() => card.classList.add("show"));

      function render(state) {
        if (!state) return;
        const version =
          state.info && state.info.version ? ` v${state.info.version}` : "";

        switch (state.status) {
          case "available":
            dot.className = "dot";
            titleEl.textContent = `Update available${version}`;
            subEl.textContent = "Downloading in the background.";
            bar.style.display = "block";
            fill.style.width = "2%";
            installBtn.style.display = "none";
            break;
          case "downloading": {
            const pct = state.progress && state.progress.percent
              ? Math.max(2, Math.min(100, state.progress.percent))
              : 5;
            dot.className = "dot";
            titleEl.textContent = `Downloading update${version}`;
            subEl.textContent = `${pct.toFixed(0)}% — you can keep working.`;
            bar.style.display = "block";
            fill.style.width = `${pct}%`;
            installBtn.style.display = "none";
            break;
          }
          case "ready":
            dot.className = "dot ready";
            titleEl.textContent = `Update ready${version}`;
            subEl.textContent = "Elevate will restart to apply.";
            bar.style.display = "none";
            installBtn.style.display = "inline-block";
            break;
          case "error":
            dot.className = "dot error";
            titleEl.textContent = "Update check failed";
            subEl.textContent = state.error || "Will retry automatically.";
            bar.style.display = "none";
            installBtn.style.display = "none";
            break;
          default:
            // checking / current / idle — toast shouldn't have been shown.
            break;
        }
      }

      installBtn.addEventListener("click", async () => {
        installBtn.disabled = true;
        installBtn.textContent = "Restarting...";
        try {
          await api.install();
        } catch (e) {
          installBtn.disabled = false;
          installBtn.textContent = "Restart to update";
        }
      });

      dismissBtn.addEventListener("click", () => {
        if (api && api.dismissToast) api.dismissToast();
      });

      if (api) {
        // Render current state immediately in case events fired before load.
        api.getStatus().then(render).catch(() => {});
        // Then stream updates.
        api.onEvent(render);
      }
    </script>
  </body>
</html>
