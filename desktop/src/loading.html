<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
        color: #e8eef8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 35%, rgba(54, 211, 153, 0.16), transparent 30%),
          linear-gradient(145deg, #08111f, #101827);
      }
      main {
        width: min(460px, calc(100vw - 48px));
        text-align: center;
      }
      .mark {
        width: 58px;
        height: 58px;
        margin: 0 auto 22px;
        border: 1px solid rgba(120, 245, 191, 0.45);
        border-radius: 18px;
        display: grid;
        place-items: center;
        color: #78f5bf;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 24px 70px rgba(20, 184, 166, 0.18);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        font-weight: 720;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: #9aa8bb;
        font-size: 15px;
        line-height: 1.6;
      }
      .bar {
        position: relative;
        height: 4px;
        margin: 26px auto 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(154, 168, 187, 0.18);
      }
      .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, #78f5bf, #60a5fa);
        animation: sweep 1.15s ease-in-out infinite;
      }
      @keyframes sweep {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">E</div>
      <h1>Starting Elevate</h1>
      <p>The desktop app is bringing the local agent runtime online.</p>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
