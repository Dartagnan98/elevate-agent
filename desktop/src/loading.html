<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Geist", "Inter", system-ui, sans-serif;
        --bg: #1a1b1a;
        --surface: #212321;
        --border: #2a2c2a;
        --text: #ececec;
        --muted: #8a8c8a;
        --accent: #D97757;
        --mono: ui-monospace, "JetBrains Mono", SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
      }
      main {
        width: min(420px, calc(100vw - 48px));
        text-align: center;
      }
      .mark {
        width: 48px;
        height: 48px;
        margin: 0 auto 28px;
        border: 1px solid var(--border);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--surface);
        color: var(--accent);
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--text);
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }
      .status {
        margin-top: 28px;
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .bar {
        position: relative;
        height: 2px;
        margin: 14px auto 0;
        max-width: 220px;
        overflow: hidden;
        border-radius: 2px;
        background: var(--border);
      }
      .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 38%;
        border-radius: inherit;
        background: var(--accent);
        animation: sweep 1.4s ease-in-out infinite;
      }
      @keyframes sweep {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(260%); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">E</div>
      <h1>Starting Elevate</h1>
      <p>Bringing the local agent runtime online.</p>
      <div class="status">BOOTING RUNTIME</div>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
