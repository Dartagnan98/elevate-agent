<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1b1a;
        --surface: #212321;
        --border: #2a2c2a;
        --text: #ececec;
        --muted: #8a8c8a;
        --muted-strong: #b6b8b6;
        --primary: #D97757;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 22% 18%, rgba(217, 119, 87, 0.18) 0%, transparent 42%),
          radial-gradient(circle at 78% 82%, rgba(217, 119, 87, 0.12) 0%, transparent 48%),
          var(--bg);
        color: var(--text);
        font-family: "Geist", -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        overflow: hidden;
        position: relative;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .aurora-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(120deg,
            rgba(217, 119, 87, 0.08) 0%,
            transparent 35%,
            rgba(217, 119, 87, 0.06) 70%,
            transparent 100%);
        background-size: 220% 220%;
        animation: aurora-drift 9s ease-in-out infinite;
      }
      @keyframes aurora-drift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      main {
        position: relative;
        z-index: 1;
        width: min(520px, calc(100vw - 48px));
        padding: 0 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        height: 28px;
        opacity: 0;
        transform: translateY(12px);
        animation: rise 600ms cubic-bezier(0.22, 1, 0.36, 1) 0ms forwards;
      }
      .logo img {
        height: 24px;
        width: auto;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }
      .eyebrow {
        margin-top: 28px;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
        opacity: 0;
        transform: translateY(12px);
        animation: rise 600ms cubic-bezier(0.22, 1, 0.36, 1) 160ms forwards;
      }
      h1 {
        margin: 8px 0 0;
        font-size: 26px;
        font-weight: 500;
        line-height: 1.1;
        letter-spacing: -0.015em;
        color: var(--text);
        opacity: 0;
        transform: translateY(12px);
        animation: rise 600ms cubic-bezier(0.22, 1, 0.36, 1) 320ms forwards;
      }
      p {
        margin: 8px auto 0;
        max-width: 360px;
        font-size: 13px;
        line-height: 1.55;
        color: var(--muted-strong);
        opacity: 0;
        transform: translateY(12px);
        animation: rise 600ms cubic-bezier(0.22, 1, 0.36, 1) 480ms forwards;
      }
      .spinner {
        margin-top: 24px;
        width: 16px;
        height: 16px;
        color: var(--muted);
        opacity: 0;
        animation: rise 600ms cubic-bezier(0.22, 1, 0.36, 1) 480ms forwards;
      }
      .spinner svg {
        width: 100%;
        height: 100%;
        animation: spin 1s linear infinite;
      }
      @keyframes rise {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .aurora-bg, .spinner svg { animation: none; }
        .logo, .eyebrow, h1, p, .spinner { opacity: 1; transform: none; animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="aurora-bg" aria-hidden="true"></div>
    <main>
      <div class="logo" aria-label="Elevation">
        <img src="elevateos-wordmark-dark.png" alt="Elevation" />
      </div>
      <div class="eyebrow">Spinning up your agents</div>
      <h1>Starting Elevate</h1>
      <p>Bringing the local agent runtime online.</p>
      <div class="spinner" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
    </main>
  </body>
</html>
